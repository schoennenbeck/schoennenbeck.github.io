version: "3"

tasks:
  install:
    desc: Install dependencies
    cmds:
      - npm install

  dev:
    desc: Start the Vite dev server with HMR
    cmds:
      - npm run dev

  build:
    desc: Production build to dist/
    cmds:
      - npm run build

  preview:
    desc: Serve the production build locally
    cmds:
      - npm run preview

  typecheck:
    desc: Type-check with vue-tsc (no emit)
    cmds:
      - npm run typecheck

  format:
    desc: Format all files with Prettier
    cmds:
      - npx prettier --write .

  format:check:
    desc: Check formatting without writing changes
    cmds:
      - npx prettier --check .

  lint:
    desc: Lint and auto-fix with ESLint
    cmds:
      - npx eslint . --fix

  lint:check:
    desc: Lint without applying fixes
    cmds:
      - npx eslint .

  check:
    desc: Run format and lint checks (no writes) — use in CI
    cmds:
      - task: format:check
      - task: lint:check
